version: '3.9'

services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:16-alpine
    container_name: service-desk-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-service_desk}
      POSTGRES_USER: ${DB_USER:-service_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-service_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-service_user} -d ${DB_NAME:-service_desk}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - service-desk-network

  # Alembic Migration Service
  migration:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: service-desk-migration
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-service_desk}
      DB_USER: ${DB_USER:-service_user}
      DB_PASSWORD: ${DB_PASSWORD:-service_pass}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
    command: python -m alembic upgrade head
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - service-desk-network
    restart: "no"

  # FastAPI Application Service
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: service-desk-api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-service_desk}
      DB_USER: ${DB_USER:-service_user}
      DB_PASSWORD: ${DB_PASSWORD:-service_pass}
      APP_NAME: ${APP_NAME:-service-desk}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
    ports:
      - "8000:8000"
    depends_on:
      migration:
        condition: service_completed_successfully
    networks:
      - service-desk-network
    restart: unless-stopped

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: service-desk-frontend
    ports:
      - "80:80"
    networks:
      - service-desk-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  service-desk-network:
    driver: bridge
