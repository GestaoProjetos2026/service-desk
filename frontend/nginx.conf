server {
  listen 80;

  # SPA — fallback para index.html
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }

  # Proxy reverso apontando diretamente para o Service do Kubernetes
  # Sem barra '/' no final para manter o prefixo '/api/' que o seu FastAPI espera
  location /api/ {
    proxy_pass         http://service-desk-backend-svc:8000;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }
}