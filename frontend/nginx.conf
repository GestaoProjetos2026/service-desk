server {
  listen 80;

  # Resolver do Docker (DNS interno). Para hosts externos ao docker
  # (ex.: backend rodando em outra VM) ajuste para o resolver da rede,
  # ex.: 8.8.8.8 ou 1.1.1.1.
  resolver 127.0.0.11 valid=10s ipv6=off;

  # SPA — fallback para index.html
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;
  }

  # Proxy reverso para o backend FastAPI.
  # O destino é injetado em runtime via envsubst a partir da variável
  # de ambiente API_PROXY_TARGET (definida no Dockerfile / docker-compose).
  # Usar uma variável aqui evita que o nginx falhe no boot caso o upstream
  # ainda não esteja de pé (resolução acontece a cada request).
  location /api/ {
    set $upstream "${API_PROXY_TARGET}";
    proxy_pass         $upstream;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
  }
}
