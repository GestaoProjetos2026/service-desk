name: Continuous Deployment

on:
  push:
    branches:
      - develop
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Set environment variables
        id: set_env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "ENV_FILE=.env.production" >> $GITHUB_ENV
            echo "ENV_NAME=production" >> $GITHUB_ENV
          else
            echo "ENV_FILE=.env.staging" >> $GITHUB_ENV
            echo "ENV_NAME=staging" >> $GITHUB_ENV
          fi

      - name: Deploy to Azure VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          command_timeout: 30m
          script: |
            # Navigate to the appropriate environment folder on your Azure VPS
            mkdir -p /home/azureuser/service-desk/${{ env.ENV_NAME }}
            cd /home/azureuser/service-desk/${{ env.ENV_NAME }}
            
            if [ ! -d ".git" ]; then
              echo "Cloning repository from scratch..."
              git clone -b ${{ github.ref_name }} https://github.com/${{ github.repository }}.git .
            else
              echo "Updating existing repository..."
              git fetch origin
              git checkout ${{ github.ref_name }}
              git reset --hard origin/${{ github.ref_name }}
            fi
            
            cp ${{ env.ENV_FILE }} .env
            docker compose build
            docker compose up -d
