name: Continuous Deployment

on:
  push:
    tags:
      - 'v*'

jobs:
  ci-cd:
    runs-on: ubuntu-latest
    steps:
      # 1. Baixar o código
      - name: Checkout
        uses: actions/checkout@v3

      # 2. Login no Registry
      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      # 3. Build e Envio
      - name: Build e Push
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/servicedesk-backend:latest

      # 4. Deploy Remoto na VM
      - name: Deploy na VM via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/servicedesk-backend:latest
            docker stop service-desk-api || true
            docker rm service-desk-api || true
            docker run -d --name service-desk-api -p 8000:8000 ${{ secrets.DOCKERHUB_USERNAME }}/servicedesk-backend:latest
